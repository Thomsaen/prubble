<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Prubble Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #1c1c1c;
      color: #ffffff;
      padding-bottom: 40px;
    }

    /* Header*/
    .section-title {
      padding: 20px 16px 6px;
      font-size: 13px;
      font-weight: 700;
      color: #e8751a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* Cards-Container */
    .card {
      background: #2e2e2e;
      margin: 0 0;
      border-top: 1px solid #3a3a3a;
      border-bottom: 1px solid #3a3a3a;
    }

    /* Single row */
    .row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #3a3a3a;
    }
    .row:last-child { border-bottom: none; }

    .row label {
      font-size: 15px;
      color: #ffffff;
      flex: 1;
    }

    .row input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #ffffff;
      text-align: right;
    }
    .row input[type="text"]::placeholder { color: #666; }

    /* input */
    .input-card {
      background: #2e2e2e;
      border-top: 1px solid #3a3a3a;
      border-bottom: 1px solid #3a3a3a;
    }
    .input-field {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #ffffff;
      padding: 14px 16px;
    }
    .input-field::placeholder { color: #666; }

    /* help */
    .hint {
      padding: 8px 16px;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    /* save-Button */
    .btn-save {
      display: block;
      width: calc(100% - 32px);
      margin: 28px 16px 0;
      padding: 15px;
      background: #e8751a;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .btn-save:active { background: #c9601a; }
  </style>
</head>
<body>

  <p class="section-title">Connection</p>

  <div class="card">
    <div class="row">
      <label>IP-Address</label>
      <input id="ip" type="text" inputmode="decimal" placeholder="192.168.178.100">
    </div>
  </div>
  <p class="hint">Local IP-Address of your Prusa</p>

  <p class="section-title">Authentification</p>

  <div class="card">
    <div class="row">
      <label>API-Key</label>
      <input id="key" type="text" placeholder="aus Druckermenü">
    </div>
  </div>
  <p class="hint">
    You find the key:<br>
    Settings → Network → PrusaLink
  </p>

  <button class="btn-save" onclick="save()">Save</button>

  <script>
    (function() {
      var hash = location.hash.slice(1);
      if (!hash) return;
      try {
        var cfg = JSON.parse(decodeURIComponent(hash));
        if (cfg.ip)     document.getElementById('ip').value  = cfg.ip;
        if (cfg.apiKey) document.getElementById('key').value = cfg.apiKey;
      } catch(e) {}
    })();

    function save() {
      var data = JSON.stringify({
        ip:     document.getElementById('ip').value.trim(),
        apiKey: document.getElementById('key').value.trim()
      });
      var encoded = encodeURIComponent(data);
      var m = location.href.match(/[?&]return_to=([^&#]+)/);
      if (m) {
        location.href = decodeURIComponent(m[1]) + '#' + encoded;
      } else {
        location.href = 'pebblejs://close#' + encoded;
      }
    }
  </script>
</body>
</html>
